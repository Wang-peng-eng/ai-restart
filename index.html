<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Restart</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      overflow:hidden;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background:
      radial-gradient(circle at top, rgba(64,114,255,0.25), transparent 40%),
      radial-gradient(circle at bottom, rgba(120,0,255,0.2), transparent 35%),
      #050816;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
    }

    .bg-grid{
      position:absolute;
      width:100%;
      height:100%;
      background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size:40px 40px;
      opacity:0.5;
    }

    .card{
      width:520px;
      padding:50px;
      border-radius:28px;
      background:rgba(17,25,40,0.75);
      border:1px solid rgba(255,255,255,0.12);
      backdrop-filter:blur(18px);
      text-align:center;
      box-shadow:
      0 0 40px rgba(84,120,255,0.15),
      0 0 120px rgba(132,0,255,0.12);
      position:relative;
      z-index:2;
      animation:float 5s ease-in-out infinite;
    }

    @keyframes float {
      0%{ transform:translateY(0px); }
      50%{ transform:translateY(-8px); }
      100%{ transform:translateY(0px); }
    }

    .tag{
      display:inline-block;
      padding:8px 18px;
      border-radius:999px;
      background:rgba(88,101,242,0.18);
      border:1px solid rgba(255,255,255,0.08);
      color:#b8c7ff;
      font-size:14px;
      margin-bottom:24px;
      letter-spacing:1px;
    }

    h1{
      font-size:64px;
      font-weight:800;
      margin-bottom:18px;
      letter-spacing:2px;
      background:linear-gradient(to right,#ffffff,#8ab4ff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .subtitle{
      font-size:18px;
      line-height:1.9;
      color:#cfd6ff;
      margin-bottom:30px;
    }

    .status{
      margin-top:10px;
      margin-bottom:35px;
      color:#8fa0ff;
      font-size:15px;
      line-height:2;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:16px;
      flex-wrap:wrap;
    }

    .btn{
      text-decoration:none;
      padding:14px 28px;
      border-radius:14px;
      font-weight:bold;
      transition:0.3s;
    }

    .primary{
      background:white;
      color:black;
    }

    .primary:hover{
      transform:translateY(-3px);
      box-shadow:0 10px 30px rgba(255,255,255,0.18);
    }

    .secondary{
      border:1px solid rgba(255,255,255,0.15);
      color:white;
      background:rgba(255,255,255,0.05);
    }

    .secondary:hover{
      background:rgba(255,255,255,0.1);
      transform:translateY(-3px);
    }

    .footer{
      margin-top:40px;
      font-size:13px;
      color:#7f88b7;
      letter-spacing:1px;
    }

    .light1,
    .light2{
      position:absolute;
      border-radius:50%;
      filter:blur(80px);
      z-index:1;
    }

    .light1{
      width:300px;
      height:300px;
      background:#375dff;
      top:-80px;
      left:-100px;
      opacity:0.25;
    }

    .light2{
      width:260px;
      height:260px;
      background:#9b3dff;
      bottom:-100px;
      right:-80px;
      opacity:0.22;
    }
  </style>
</head>

<body>

  <div class="bg-grid"></div>
  <div class="light1"></div>
  <div class="light2"></div>

  <div class="card">

    <div class="tag">
      AI ERA RESTART
    </div>

    <h1>AI Restart</h1>

    <div class="subtitle">
      一个待业两年的人，<br>
      正在 AI 时代重新开始。
    </div>

    <div class="status">
      Day 1 · ChatGPT · Codex · GitHub<br>
      正在学习、创造、重新进入世界。
    </div>

    <div class="buttons">
      <a class="btn primary" href="https://github.com/Wang-peng-eng" target="_blank">
        My GitHub
      </a>

      <a class="btn secondary" href="#">
        AI Journey
      </a>
    </div>

    <div class="footer">
      Restarting life in the age of AI.
    </div>

  </div>

</body>
</html>
