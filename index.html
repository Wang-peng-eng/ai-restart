<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Restart</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0f1117;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      padding: 24px;
    }

    .card {
      width: min(500px, 100%);
      text-align: center;
      padding: 40px 32px;
      border: 1px solid #333846;
      border-radius: 8px;
      background: #1a1d26;
    }

    h1 {
      font-size: 48px;
      line-height: 1.1;
      margin: 0 0 16px;
    }

    p {
      margin: 18px 0 0;
      color: #b8bdc9;
      line-height: 1.8;
      font-size: 16px;
    }

    .btn {
      display: inline-block;
      margin-top: 28px;
      padding: 12px 24px;
      background: #ffffff;
      color: #111111;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      background: #e7e9ef;
    }

    @media (max-width: 520px) {
      .card {
        padding: 32px 22px;
      }

      h1 {
        font-size: 38px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>AI Restart</h1>

    <p>
      一个待业两年的人，<br />
      正在AI时代重新开始。
    </p>

    <p>
      Day 1:<br />
      ChatGPT / Codex / GitHub / 人工智能重启计划
    </p>

    <a class="btn" href="https://github.com/Wang-peng-eng" target="_blank" rel="noopener noreferrer">
      My GitHub
    </a>
  </main>
</body>
</html>
